<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – GroutGrove</title>
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-page{min-height:100vh;background:linear-gradient(135deg,#020D06 0%,#004225 50%,#0A1A10 100%);display:flex;align-items:center;justify-content:center;padding:30px 20px;position:relative;overflow:hidden}
    .auth-page::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border:1px solid rgba(80,200,120,.06);border-radius:50%}
    .auth-page::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;border:1px solid rgba(245,197,24,.05);border-radius:50%}
    .auth-box{background:white;border-radius:28px;padding:44px 40px;width:100%;max-width:480px;box-shadow:0 24px 80px rgba(0,0,0,.4);position:relative;z-index:1}
    .auth-logo{font-family:'Playfair Display',serif;font-size:36px;font-weight:800;color:#004225;text-align:center;margin-bottom:4px}
    .auth-logo span{color:#FF6B47}
    .auth-sub{text-align:center;color:#64748B;font-size:14px;margin-bottom:28px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-field{margin-bottom:16px}
    .form-field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
    .form-field input,.form-field select{width:100%;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px 15px;font-family:'DM Sans';font-size:15px;outline:none;background:#FAFCFB;color:#1E293B;transition:border .2s}
    .form-field input:focus,.form-field select:focus{border-color:#2D7A50;background:white}
    .btn-signup{width:100%;background:linear-gradient(135deg,#FF6B47,#E55534);color:white;border:none;border-radius:50px;padding:15px;font-family:'DM Sans';font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,71,.35);transition:all .2s;margin-top:4px}
    .btn-signup:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,71,.45)}
    .btn-signup:disabled{background:#94A3B8;box-shadow:none;cursor:not-allowed;transform:none}
    .err-msg{background:#FEE2E2;border:1.5px solid #E74C3C;border-radius:12px;padding:13px;font-size:13px;color:#C0392B;margin-bottom:16px;display:none}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0}
    .divider span{flex:1;height:1px;background:#E2E8F0}
    .divider p{font-size:13px;color:#94A3B8}
    .btn-login-alt{width:100%;background:#F0F7F2;color:#2D7A50;border:1.5px solid #C8DDD0;border-radius:50px;padding:14px;font-family:'DM Sans';font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:all .2s}
    .btn-login-alt:hover{background:#E0EFE8}
    .back-home{display:block;text-align:center;margin-top:20px;color:#94A3B8;font-size:13px;text-decoration:none;transition:color .2s}
    .back-home:hover{color:#2D7A50}
    .welcome-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px}
    .welcome-overlay.show{display:flex}
    .welcome-card{background:white;border-radius:28px;padding:50px 36px;text-align:center;max-width:400px;width:100%;animation:scaleIn .4s ease}
    @keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    .w-ico{font-size:70px;margin-bottom:18px;display:block}
    .w-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:#1E293B;margin-bottom:8px}
    .w-title span{color:#FF6B47}
    .w-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#2D7A50;margin-bottom:12px}
    .w-msg{color:#64748B;font-size:15px;line-height:1.7;margin-bottom:26px}
    .w-btn{background:linear-gradient(135deg,#2D7A50,#004225);color:white;border:none;border-radius:50px;padding:15px 40px;font-family:'DM Sans';font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(0,66,37,.3)}
  </style>
</head>
<body>

<!-- WELCOME OVERLAY -->
<div class="welcome-overlay" id="welcomeOverlay">
  <div class="welcome-card">
    <span class="w-ico">🎉</span>
    <div class="w-title">Welcome to <span>GroutGrove!</span></div>
    <div class="w-name" id="wName"></div>
    <div class="w-msg">Your account has been created successfully!<br>Now you can order construction materials at the best prices.</div>
    <button class="w-btn" onclick="window.location.href='../index.html'">🛒 Start Shopping!</button>
  </div>
</div>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Grout<span>Grove</span></div>
    <div class="auth-sub">Create your free account — takes less than 1 minute!</div>

    <div class="err-msg" id="errMsg"></div>

    <div class="form-row">
      <div class="form-field"><label>First Name *</label><input type="text" id="firstName" placeholder="Rajesh"/></div>
      <div class="form-field"><label>Last Name *</label><input type="text" id="lastName" placeholder="Kumar"/></div>
    </div>
    <div class="form-field"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+91 XXXXX XXXXX" maxlength="13"/></div>
    <div class="form-field"><label>Email (Optional)</label><input type="email" id="email" placeholder="your@email.com"/></div>
    <div class="form-row">
      <div class="form-field"><label>City *</label>
        <select id="city">
          <option value="">Select City</option>
          <option>Delhi</option><option>Noida</option><option>Greater Noida</option><option>Gurugram</option><option>Ghaziabad</option><option>Faridabad</option><option>Other</option>
        </select>
      </div>
      <div class="form-field"><label>You Are *</label>
        <select id="userType">
          <option value="">Select</option>
          <option>Home Owner</option>
          <option>Contractor</option>
          <option>Builder</option>
          <option>Architect</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Password * (min 6 chars)</label><input type="password" id="password" placeholder="Create strong password"/></div>
    <div class="form-field"><label>Confirm Password *</label><input type="password" id="confirmPass" placeholder="Repeat your password"/></div>

    <button class="btn-signup" id="signupBtn" onclick="doSignup()">✅ Create Free Account</button>

    <div class="divider"><span></span><p>Already have an account?</p><span></span></div>
    <a href="login.html" class="btn-login-alt">👤 Login Instead</a>
    <a href="../index.html" class="back-home">← Back to GroutGrove</a>
  </div>
</div>

<script src="../script.js"></script>
<script>
  const{createClient}=supabase;
  const sb=createClient('https://ddgwdesqicrneikxrcnj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZ3dkZXNxaWNybmVpa3hyY25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mzc1MTksImV4cCI6MjA4OTMxMzUxOX0.AFH7Sfat5XnYFYocdbjZlYhL5iLG1dO6wXm_FHycAqo');

  function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';e.scrollIntoView({behavior:'smooth',block:'nearest'});}

  async function doSignup(){
    const fn=document.getElementById('firstName').value.trim();
    const ln=document.getElementById('lastName').value.trim();
    const ph=document.getElementById('phone').value.trim();
    const em=document.getElementById('email').value.trim();
    const ci=document.getElementById('city').value;
    const ut=document.getElementById('userType').value;
    const pw=document.getElementById('password').value;
    const cp=document.getElementById('confirmPass').value;

    if(!fn){showErr('⚠️ Please enter your first name!');return;}
    if(!ln){showErr('⚠️ Please enter your last name!');return;}
    if(!ph||ph.replace(/\D/g,'').length<10){showErr('⚠️ Please enter a valid phone number!');return;}
    if(!ci){showErr('⚠️ Please select your city!');return;}
    if(!ut){showErr('⚠️ Please select what you are!');return;}
    if(!pw||pw.length<6){showErr('⚠️ Password must be at least 6 characters!');return;}
    if(pw!==cp){showErr('❌ Passwords do not match!');return;}

    const btn=document.getElementById('signupBtn');
    btn.textContent='⏳ Creating account...';btn.disabled=true;
    document.getElementById('errMsg').style.display='none';

    // Check if phone already registered
    const{data:ex}=await sb.from('customers').select('phone').eq('phone',ph);
    if(ex&&ex.length>0){showErr('❌ This phone number is already registered! Please login.');btn.textContent='✅ Create Free Account';btn.disabled=false;return;}

    const fullName=fn+' '+ln;
    const{data,error}=await sb.from('customers').insert([{full_name:fullName,phone:ph,password:pw,city:ci}]).select();
    if(error){showErr('❌ Error: '+error.message);btn.textContent='✅ Create Free Account';btn.disabled=false;return;}

    localStorage.setItem('nx_user',JSON.stringify({name:fullName,phone:ph,city:ci,id:data[0].id}));
    document.getElementById('wName').textContent='Welcome, '+fn+'! 👋';
    document.getElementById('welcomeOverlay').classList.add('show');
  }
</script>
</body>
</html>
